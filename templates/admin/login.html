{% extends "base.html" %}

{% block title %}Admin Sign In{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<style>
  .admin-login-wrap {
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 16px;
    background:
      radial-gradient(circle at 10% 12%, rgba(255, 122, 42, 0.18), transparent 34%),
      radial-gradient(circle at 86% 10%, rgba(255, 122, 42, 0.08), transparent 35%),
      linear-gradient(160deg, #06080d 0%, #090c12 52%, #050608 100%);
  }

  .admin-login-card {
    max-width:440px;
    width:100%;
    padding:28px;
    border-radius:2px;
    border: 1px solid rgba(255,255,255,0.12);
    background: linear-gradient(160deg, rgba(18,22,30,0.98), rgba(10,13,18,0.98));
    box-shadow: 0 22px 42px rgba(0,0,0,0.46), inset 0 0 0 1px rgba(255,122,42,0.08);
  }

  .admin-login-title {
    text-align:center;
    margin-bottom:8px;
    color:#f8fafc;
    font-family: "Oswald", "Arial Narrow", "Impact", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 29px;
  }

  .admin-login-form { margin-top:18px; }

  #adminResult { margin-top:14px; display:none; }
  #adminResult.success { display:block; }
  #adminResult.error { display:block; }
</style>
{% endblock %}

{% block body %}
<div class="admin-login-wrap">
  <div class="admin-login-card">
    <h2 class="admin-login-title">Admin Sign In</h2>
    <p class="subtitle text-center">Restricted access — administrators only</p>
    <form id="adminLoginForm" class="admin-login-form" onsubmit="return handleAdminLogin(event)">
      <div class="form-group">
        <label for="a_username">Username</label>
        <input id="a_username" type="text" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="a_password">Password</label>
        <input id="a_password" type="password" required autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary">Sign In as Admin</button>
    </form>

    <div id="adminResult" class="status"></div>
  </div>
</div>

<script>
function showAdminResult(msg, cls){
  const el = document.getElementById('adminResult');
  el.style.display = 'block';
  el.className = 'status ' + (cls === 'success' ? 'status-success' : 'status-error');
  el.innerHTML = msg;
}

function handleAdminLogin(e){
  e.preventDefault();
  const u = document.getElementById('a_username').value.trim();
  const p = document.getElementById('a_password').value;
  if(!u||!p){ showAdminResult('Enter username and password','error'); return false; }
  fetch('/admin/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username:u,password:p}) })
    .then(async (r)=>{ const b = await r.json().catch(()=>({})); return {s:r.status,b}; })
    .then(({s,b})=>{
      if(s===200 && b.success){ showAdminResult('Authenticated — redirecting...','success'); setTimeout(()=>window.location.href='/admin',900); }
      else showAdminResult(b.message||'Login failed','error');
    }).catch(err=>{ showAdminResult('Server error','error'); console.error(err); });
  return false;
}
</script>
{% endblock %}
