{% extends "base.html" %}
{% set hide_nav = True %}

{% block title %}JANUS // Two-Factor Verification{% endblock %}

{% block body %}
<div class="font-sans antialiased selection:bg-safety selection:text-void flex flex-col min-h-screen bg-void w-full relative select-none">
    <div class="blueprint-grid blueprint-grid-fixed z-0 pointer-events-none"></div>
    <canvas id="topo-bg-canvas" class="fixed inset-0 w-full h-full z-0 opacity-10 pointer-events-none"></canvas>

    <main class="flex-grow relative z-10 flex items-start sm:items-center justify-center p-4 py-12">
        <div class="w-full max-w-lg bg-void/90 backdrop-blur-xl border border-border-dim p-8 md:p-12 shadow-2xl relative">
            <div class="mb-10 text-center">
                <h1 class="font-sans text-4xl md:text-5xl font-bold text-stark mb-2 tracking-wide uppercase">
                    2FA Challenge
                </h1>
                <p class="font-sans text-sm text-muted">
                    Enter the authenticator code for <span class="text-safety font-bold">{{ username or 'your account' }}</span>
                </p>
            </div>

            <form id="two-factor-form" class="flex flex-col gap-5" onsubmit="event.preventDefault(); submit2fa();">
                <div>
                    <label class="block text-[10px] text-muted font-bold uppercase tracking-widest mb-2 font-mono">Username</label>
                    <input type="text" id="tf-username" value="{{ username or '' }}" class="w-full tactical-input py-3 px-4 text-xs tracking-wider text-stark" autocomplete="off" spellcheck="false" placeholder="Username">
                </div>

                <div>
                    <label class="block text-[10px] text-safety font-bold uppercase tracking-widest mb-2 font-mono">TOTP Code</label>
                    <input type="text" id="tf-token" inputmode="numeric" maxlength="6" class="w-full tactical-input py-3 px-4 text-xs tracking-wider text-safety" autocomplete="one-time-code" placeholder="123456">
                </div>

                <button type="submit" id="verify-btn" class="w-full bg-stark text-void font-bold text-[11px] uppercase tracking-widest py-4 mt-2 hover:bg-white transition-colors">
                    Verify 2FA
                </button>

                <p id="tf-message" class="text-[10px] font-mono uppercase tracking-widest text-muted min-h-[1.25rem]"></p>
            </form>
        </div>
    </main>
</div>

<script nonce="{{ csp_nonce() }}">
    const usernameInput = document.getElementById('tf-username');
    const tokenInput = document.getElementById('tf-token');
    const messageEl = document.getElementById('tf-message');
    const verifyBtn = document.getElementById('verify-btn');

    function setMessage(message, isError = false) {
        messageEl.textContent = message;
        messageEl.classList.toggle('text-safety', !isError);
        messageEl.classList.toggle('text-red-400', isError);
    }

    async function submit2fa() {
        const username = usernameInput.value.trim();
        const token = tokenInput.value.trim();

        if (!username) {
            setMessage('Username is required.', true);
            usernameInput.focus();
            return;
        }

        if (!token) {
            setMessage('TOTP code is required.', true);
            tokenInput.focus();
            return;
        }

        verifyBtn.disabled = true;
        verifyBtn.textContent = 'VERIFYING...';
        setMessage('Verifying code...');

        try {
            const res = await fetch('/api/2fa/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, token })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                setMessage('Access granted. Redirecting...');
                window.location.href = data.redirect || '/dashboard';
                return;
            }

            setMessage(data.message || 'Invalid 2FA code.', true);
        } catch (err) {
            setMessage('Network error.', true);
        } finally {
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify 2FA';
        }
    }
</script>
{% endblock %}
