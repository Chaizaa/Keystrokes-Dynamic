<html>
  <body>
    <p>Hello {{ username }},</p>
    <p>Use the following verification code to verify your email for your SecureAuth account:</p>
    <p style="font-size:1.25em;font-weight:600"><code style="display:block;padding:8px 12px;background:#0f1724;border-radius:6px;color:#fff;word-break:break-all;">{{ token }}</code></p>
    <p>Or click <a href="{{ verification_url }}">this link</a> to open the verification page.</p>
    <p>If you didn't request this, please ignore this message.</p>
  </body>
</html>
