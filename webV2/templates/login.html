<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Biometrik</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f4f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Style Wrapper */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin: 8px 0;
        }
        
        input { 
            width: 100%; 
            padding: 12px; 
            padding-right: 40px;
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        }

        /* Style Ikon */
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }
        .toggle-password:hover { color: #333; }

        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        #resultBox { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    
    <!-- Wrapper Password -->
    <div class="input-wrapper">
        <input type="password" id="passwordField" placeholder="Password">
        <span class="toggle-password" onclick="togglePass()">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
    </div>
    
    <button onclick="doLogin()">Masuk</button>
    <p style="text-align: center; margin-top: 10px;"><a href="/register">Belum punya akun? Daftar</a></p>

    <div id="resultBox"></div>
</div>

<script>
    // TOGGLE FUNCTION
    function togglePass() {
        const input = document.getElementById('passwordField');
        const icon = document.getElementById('eyeIcon');
        // SVG Paths
        const pathOn = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        const pathOff = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

        if (input.type === "password") {
            input.type = "text";
            icon.innerHTML = pathOff;
        } else {
            input.type = "password";
            icon.innerHTML = pathOn;
        }
    }

    // LOGIKA UTAMA
    let rawEvents = [];
    const passwordField = document.getElementById('passwordField');
    const resultBox = document.getElementById('resultBox');

    passwordField.addEventListener('keydown', (event) => {
        const isModifier = ['Shift', 'Control', 'Alt', 'Meta', 'CapsLock'].some(mod => event.key === mod);
        if (event.repeat && !isModifier) { event.preventDefault(); return; }
        if (event.repeat && isModifier) return;

        rawEvents.push({ key: event.key, code: event.code, evt: 'd', t: performance.now() });
    });

    passwordField.addEventListener('keyup', (event) => {
        rawEvents.push({ key: event.key, code: event.code, evt: 'u', t: performance.now() });
        if (event.key === 'Enter') doLogin();
    });

    async function doLogin() {
        const user = document.getElementById('username').value;
        
        resultBox.style.display = 'block';
        resultBox.className = ''; 
        resultBox.innerText = "Memverifikasi...";

        try {
            const response = await fetch('/api/login_attempt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user,
                    events: rawEvents
                })
            });

            const result = await response.json();

            if (result.status === 'success') {
                resultBox.className = 'success';
                resultBox.innerText = "LOGIN SUKSES! (Data tersimpan untuk analisis)";
            } else {
                resultBox.className = 'error';
                resultBox.innerText = "GAGAL: " + result.message;
            }
            
            rawEvents = [];
            passwordField.value = '';

        } catch (error) {
            resultBox.className = 'error';
            resultBox.innerText = "Server Error.";
        }
    }
</script>

</body>
</html>
