<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keystroke Dynamics Auth</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 50px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        
        .btn:active { transform: scale(0.98); }

        .btn-login {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }
        .btn-login:hover { background-color: #0056b3; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }

        .btn-register {
            background-color: white;
            color: #28a745;
            border: 2px solid #28a745;
        }
        .btn-register:hover { background-color: #e9f7ef; }

        .footer { margin-top: 20px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Biometric Auth</h1>
        <p>Sistem keamanan berbasis perilaku pengetikan (Keystroke Dynamics).</p>

        <a href="/login" class="btn btn-login">Masuk (Login)</a>
        <a href="/register" class="btn btn-register">Daftar Baru</a>

        <div class="footer">Project Skripsi/Tugas Akhir</div>
    </div>

</body>
</html>
