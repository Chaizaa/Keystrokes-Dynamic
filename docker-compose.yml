services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keystrokes-dynamic
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      PORT: "5000"
      SECRET_KEY: local-dev-secret-change-me
      DATABASE_TYPE: sqlite
      DATABASE_PATH: data/biometric_auth.db
      MIN_ENROLLMENT_SAMPLES: "30"
      RECOMMENDED_SAMPLES: "30"
      ML_BACKEND: rf
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health/ready', timeout=3).getcode()==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
