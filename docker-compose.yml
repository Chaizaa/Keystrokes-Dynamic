services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      PORT: ${PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-change-me}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_PATH: ${DATABASE_PATH:-data/biometric_auth.db}
      MIN_ENROLLMENT_SAMPLES: ${MIN_ENROLLMENT_SAMPLES:-30}
      RECOMMENDED_SAMPLES: ${RECOMMENDED_SAMPLES:-30}
      ML_BACKEND: ${ML_BACKEND:-rf}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health/ready', timeout=3).getcode()==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
